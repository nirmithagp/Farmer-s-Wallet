<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Price Forecast - Farmers Wallet</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .forecast-container {
            max-width: 900px;
            margin: var(--spacing-xl) auto;
        }

        .result-box {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-top: var(--spacing-lg);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chart-placeholder {
            height: 300px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <div class="nav-container">
                <a href="/" class="nav-logo"><span class="nav-logo-icon">🌾</span>Farmers Wallet</a>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="/" class="nav-link">Home</a></li>
                    <li><a href="/financial-advice" class="nav-link">Financial Advice</a></li>
                    <li><a href="/expense-form" class="nav-link">Expense Tracking</a></li>
                    <li><a href="/price-form" class="nav-link active">Price Forecast</a></li>
                    <li><a href="/loan-recommendations" class="nav-link">Loan Recommendations</a></li>
                    <li class="lang-selector">
                        <button class="lang-btn" id="langBtn">
                            <i class="fas fa-globe"></i>
                            <span id="currentLang">English</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                    </li>
                </ul>
                <button class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <div class="container forecast-container">
        <div class="text-center mb-lg">
            <h1 class="hero-title" style="font-size:2.5rem;" data-en="Market Price Forecast"
                data-hi="बाजार मूल्य पूर्वानुमान" data-kn="ಮಾರುಕಟ್ಟೆ ಬೆಲೆ ಮುನ್ಸೂಚನೆ" data-ta="சந்தை விலை முன்னறிவிப்பு"
                data-te="మార్కెట్ ధర అంచనా" data-ml="വിപണി വില പ്രവചനം">Market Price Forecast</h1>
            <p class="hero-subtitle" style="font-size:1.1rem;" data-en="Predict future prices for your crops"
                data-hi="अपनी फसलों के लिए भविष्य की कीमतों की भविष्यवाणी करें"
                data-kn="ನಿಮ್ಮ ಬೆಳೆಗಳಿಗೆ ಭವಿಷ್ಯದ ಬೆಲೆಗಳನ್ನು ಊಹಿಸಿ"
                data-ta="உங்கள் பயிர்களுக்கான எதிர்கால விலைகளை கணிக்கவும்"
                data-te="మీ పంటల భవిష్యత్తు ధరలను అంచనా వేయండి" data-ml="നിങ്ങളുടെ വിളകളുടെ ഭാവി വിലകൾ പ്രവചിക്കുക">
                Predict future prices for your crops</p>
        </div>

        <div class="card">
            <div class="card-content">
                <form method="POST" action="/price-form">
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" data-en="Commodity" data-hi="वस्तु" data-kn="ಸರಕು"
                                data-ta="பொருள்" data-te="సరుకు" data-ml="ചരക്ക്"><i class="fas fa-leaf"></i>
                                Commodity</label>
                            <select name="commodity" class="form-select" required>
                                <option value="jowar">Jowar</option>
                                <option value="wheat">Wheat</option>
                                <option value="cotton">Cotton</option>
                                <option value="sugarcane">Sugarcane</option>
                                <option value="bajara">Bajara</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-en="Month (1-12)" data-hi="महीना (1-12)"
                                data-kn="ತಿಂಗಳು (1-12)" data-ta="மாதம் (1-12)" data-te="నెల (1-12)"
                                data-ml="മാസം (1-12)"><i class="fas fa-calendar-alt"></i> Month (1-12)</label>
                            <input type="number" name="month" class="form-input" min="1" max="12" required>
                        </div>
                    </div>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" data-en="Year" data-hi="वर्ष" data-kn="ವರ್ಷ" data-ta="ஆண்டு"
                                data-te="సంవత్సరం" data-ml="വർഷം"><i class="fas fa-calendar"></i> Year</label>
                            <input type="number" name="year" class="form-input" min="2000" max="2100" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;">
                        <i class="fas fa-chart-line"></i>
                        <span data-en="Predict Price" data-hi="मूल्य की भविष्यवाणी करें" data-kn="ಬೆಲೆ ಊಹಿಸಿ"
                            data-ta="விலையை கணிக்கவும்" data-te="ధరను అంచనా వేయండి" data-ml="വില പ്രവചിക്കുക">Predict
                            Price</span>
                    </button>
                </form>
            </div>
        </div>

        {% if result %}
        <div class="result-box fade-in">
            <h2 style="color: var(--primary-gold); margin-bottom: var(--spacing-md);"><i class="fas fa-dollar-sign"></i>
                <span data-en="Predicted Price Range" data-hi="अनुमानित मूल्य सीमा" data-kn="ಅಂದಾಜು ಬೆಲೆ ಶ್ರೇಣಿ"
                    data-ta="கணிக்கப்பட்ட விலை வரம்பு" data-te="అంచనా వేయబడిన ధర శ్రేణి"
                    data-ml="പ്രവചിച്ച വില പരിധി">Predicted Price Range</span>
            </h2>
            <p class="hero-subtitle" style="font-size:1.5rem;">₹ {{ result }} <span data-en="per quintal"
                    data-hi="प्रति क्विंटल" data-kn="ಪ್ರತಿ ಕ್ವಿಂಟಾಲ್" data-ta="ஒரு குவிண்டால்" data-te="క్వింటాల్‌కు"
                    data-ml="ക്വിന്റലിന്">per quintal</span></p>

            <div style="margin-top: var(--spacing-lg); height: 300px;">
                <canvas id="priceChart"></canvas>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const ctx = document.getElementById('priceChart').getContext('2d');

                // Parse the result string "min - max" to get an average
                const resultStr = "{{ result }}";
                let avgPrice = 0;

                if (resultStr.includes('-')) {
                    const parts = resultStr.split('-');
                    const min = parseFloat(parts[0]);
                    const max = parseFloat(parts[1]);
                    avgPrice = (min + max) / 2;
                } else {
                    avgPrice = parseFloat(resultStr.replace(/[^\d.]/g, '')) || 2000;
                }

                // Generate simulated trend data
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
                const currentMonthIndex = new Date().getMonth();

                // Reorder months to start from current
                const labels = [];
                for (let i = 0; i < 6; i++) {
                    const mIndex = (currentMonthIndex + i) % 12;
                    const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                    labels.push(monthNames[mIndex]);
                }

                // Generate data points fluctuating around the predicted price
                const dataPoints = labels.map((_, i) => {
                    // Add some random fluctuation +/- 10%
                    const fluctuation = (Math.random() * 0.2) - 0.1;
                    // Trend slightly upwards
                    const trend = i * 0.02;
                    return Math.round(avgPrice * (1 + fluctuation + trend));
                });

                // Set the specific predicted month (e.g., 3rd month) to the actual prediction
                // For simplicity, we just use the generated trend

                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Price Trend Forecast (₹/Quintal)',
                            data: dataPoints,
                            borderColor: '#4CAF50',
                            backgroundColor: 'rgba(76, 175, 80, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#FFC107',
                            pointRadius: 5,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#fff' }
                            },
                            tooltip: {
                                mode: 'index',
                                intersect: false,
                            }
                        },
                        scales: {
                            y: {
                                grid: { color: 'rgba(255,255,255,0.1)' },
                                ticks: { color: '#aaa' },
                                title: { display: true, text: 'Price (₹)', color: '#aaa' }
                            },
                            x: {
                                grid: { display: false },
                                ticks: { color: '#aaa' }
                            }
                        },
                        interaction: {
                            mode: 'nearest',
                            axis: 'x',
                            intersect: false
                        }
                    }
                });
            });
        </script>
        {% endif %}
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
